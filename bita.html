<!DOCTYPE html>
<html lang="id">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>    
    <style>
        body {
           margin: 0;
           padding: 0;
           width: 100vw;
           height: 100vh;
           background-color: #faf4e0;
           display: flex;
           justify-content: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        .portfolio-image {
            flex-grow: 1;
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        
        .small-logo {
            position: absolute;
            bottom: 400 px;
            left: 60%;
            transform: translateX(-50);
            z-index: 100;
        }

        .small-logo img {
            width: 60px;
            height: auto;
            cursor: pointer;
            display: block
        }
        /* 🎧 Popup */
.music-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #e27373;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
    </style>
</head>
<body>

    <div class="container">
        <img src="Abot.png" alt="portfolio" class="Abot-image">

        <a href="https://www.instagram.com/nid4wo?igsh=M2hvemhob3ptcmti" target="_blank" 
        class="small-logo">
            <img src="logoig.jpg" alt="Instagram">
        </a>
    </div>
    <!-- 🎧 POPUP -->
    <div class="music-popup" id="popup">
        <p>Welcomee to my page😊</p>
        <button onclick="playMusic()"> Music🎧 </button>
        <button onclick="closePopup()">No music </button>
    </div>

    <!-- 🎵 AUDIO -->
    <audio id="bg-music" loop>
        <source src="wakingtuget.mp3" type="audio/mpeg">
    </audio>
    </div>
    
     <script>
        function playMusic() {
            var music = document.getElementById("bg-music");
            music.play();
            document.getElementById("popup").style.display = "none";
        }

        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>

</body>
</html>
