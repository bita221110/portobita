<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
    <style>
        body {
           margin: 0;
           padding: 0;
           width: 100vw;
           height: 100vh;
           background-color: #faf4e0;
           display: flex;
           justify-content: center;
            
        }
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        .portfolio-image {
            flex-grow: 1;
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        
        .small-logo {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .small-logo img {
            width: 100px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="portfolio.jpg" alt="portfolio" class="portfolio-image">

        <a href="https://www.instagram.com/nid4wo?igsh=M2hvemhob3ptcmti" target="_blank" 
        class="small-logo">
            <img src="logoig.jpg" alt="Instagram">
        </a>
    </div>

</body>
</html>
